<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>career link</title>
    <link rel="stylesheet" href="../css/career.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <h1>CAREER LINK</h1>
          <p>linking talent and opportunity</p>
        </div>

        <!--navigation section-->
        <div class="nav-links">
          <a href="career.html">Home</a>
          <a href="jobs.html">Jobs</a>
          <a href="post-job.html">Post Job</a>
          <a href="about.html">About</a>
          <div class="search-btn">
          <input type="text" id="job-search" placeholder="search jobs...">
          <button id="search-btn">search</button>
          </div>
          <button class="login-btn" id="login-btn">login</button>
        </div>
      </nav>
    </header>
    <!--post job section-->
    <section id="post-job" class="post-job">
      <h2>Post a job</h2>
      <form id="job-form">
        <input type="text" id="job-title"placeholder="Job title" required />
        <input type="text" id="company" placeholder="Company Name" required />
        <input type="text" id="location" placeholder="location" required />
        <button type="submit" class="apply-btn">post job</button>
      </form>
    </section>
    <div id="popup" class="popup">action completed!</div>
    <script src="../javascript/career.js"></script>
    <!--footer-->
    <footer>
      <p>&copy;2026 Career Link.All rights reserved</p>
    </footer>
  </body>
</html>
