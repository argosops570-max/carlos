<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Link</title>
    <link rel="stylesheet" href="../css/career.css" />
  </head>
  <body>
    <!--header section-->
    <header>
      <nav>
        <div class="logo">
          <h1>CAREER LINK</h1>
          <p>linking talent and opportunity</p>
        </div>

        <!--navigation section-->
        <div class="nav-links">
          <a href="career.html">Home</a>
          <a href="jobs.html">Jobs</a>
          <a href="post-job.html">Post Job</a>
          <a href="about.html">About</a>
          <div class="search-box">
          <input type="text" id="job-search" placeholder="search jobs...">
          <button id="search-btn">search</button>
          </div>
          <button class="login-btn" id="login-btn">login</button>
        </div>
      </nav>
    </header>
    <!--home section-->
    <section id="home" class="hero">
      <div class="hero-container">
        <div class="hero-text">
          <h1>Find your <span>dream job</span></h1>
          <p>
            Explore thousands of job listings<br />
            from top companies in kenya
          </p>
          <a href="jobs.html" class="apply-btn">view jobs</a>
          <a href="post-job.html" class="apply-btn">post a job</a>
        </div>
        <div class="hero-image">
          <img
            src="../images/well_dressed_man-removebg-preview.png"
            alt="well dressed man"
            class="hero-image"
          />
        </div>
      </div>
    </section>
    <div id="popup" class="popup">action completed!</div>
    <script src="../javascript/career.js"></script>

    <!--footer-->
    <footer>
      <p>&copy;2026 Career Link.All rights reserved</p>
    </footer>
  </body>
</html>
